<!DOCTYPE html> <html> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Sales Call Analyzer</title> <style> * { margin: 0; padding: 0; box-sizing: border-box; } body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; } .container { max-width: 700px; width: 100%; background: white; border-radius: 10px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2); padding: 40px; } h1 { color: #333; margin-bottom: 10px; font-size: 28px; } .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; } .form-group { margin-bottom: 20px; } label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; } textarea { width: 100%; height: 200px; padding: 12px; border: 2px solid #e0e0e0; border-radius: 5px; font-family: 'Courier New', monospace; font-size: 14px; resize: vertical; transition: border-color 0.3s; } textarea:focus { outline: none; border-color: #667eea; } button { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; } button:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); } button:active { transform: translateY(0); } button:disabled { opacity: 0.6; cursor: not-allowed; } .loading { display: none; text-align: center; margin-top: 20px; } .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 10px; } @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } .result-section { margin-top: 30px; display: none; } .result-section.show { display: block; } .result-title { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 15px; } pre { background: #f5f5f5; padding: 20px; border-radius: 5px; border-left: 4px solid #667eea; white-space: pre-wrap; word-wrap: break-word; line-height: 1.6; color: #333; font-size: 14px; max-height: 400px; overflow-y: auto; } .error { color: #e74c3c; margin-top: 15px; padding: 12px; background: #fadbd8; border-radius: 5px; display: none; } .error.show { display: block; } </style> </head> <body> <div class="container"> <h1>📞 Sales Call Analyzer</h1> <p class="subtitle">Analyze your sales calls with AI-powered insights</p> <div class="form-group"> <label for="call">Paste your sales call transcript:</label> <textarea id="call" placeholder="Enter the sales call transcript here..."></textarea> </div> <button id="analyzeBtn" onclick="analyze()">Analyze Call</button> <div class="loading" id="loading"> <div class="spinner"></div> <p>Analyzing your call...</p> </div> <div class="error" id="error"></div> <div class="result-section" id="resultSection"> <div class="result-title">📊 Analysis Results:</div> <pre id="result"></pre> </div> </div> <script> const API_BASE_URL = window.location.origin; async function analyze() { const text = document.getElementById("call").value; const analyzeBtn = document.getElementById("analyzeBtn"); const loading = document.getElementById("loading"); const error = document.getElementById("error"); const resultSection = document.getElementById("resultSection"); if (!text.trim()) { error.textContent = "Please enter a sales call transcript."; error.classList.add("show"); return; } error.classList.remove("show"); loading.style.display = "block"; resultSection.classList.remove("show"); analyzeBtn.disabled = true; try { const response = await fetch(`${API_BASE_URL}/analyze`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ text }) }); if (!response.ok) { throw new Error(`API error: ${response.statusText}`); } const data = await response.json(); document.getElementById("result").innerText = data.analysis; resultSection.classList.add("show"); } catch (err) { console.error("Error:", err); error.textContent = "Failed to analyze the call. Please try again."; error.classList.add("show"); } finally { loading.style.display = "none"; analyzeBtn.disabled = false; } } </script> </body> </html>
